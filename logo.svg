<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Sunset Sky Gradient (Vibrant Red to Gold) -->
    <linearGradient id="sunsetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E31C25" />
      <stop offset="40%" stop-color="#F37021" />
      <stop offset="100%" stop-color="#FDB813" />
    </linearGradient>

    <!-- Outer Ring Gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDB813" />
      <stop offset="50%" stop-color="#F37021" />
      <stop offset="100%" stop-color="#E31C25" />
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF066" />
      <stop offset="30%" stop-color="#FDB813" />
      <stop offset="70%" stop-color="#F37021" />
      <stop offset="100%" stop-color="#E31C25" />
    </linearGradient>

    <!-- Drop Shadow for Text -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="5" stdDeviation="3" flood-color="#000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Outer Glowing Gold-Red Ring -->
  <circle cx="256" cy="256" r="236" stroke="url(#ringGrad)" stroke-width="8" fill="none" />
  
  <!-- Main Sunset Circle Background -->
  <circle cx="256" cy="256" r="220" fill="url(#sunsetGrad)" />

  <!-- Tropical Island / Grass Hill at the Bottom -->
  <path d="M 100 390 Q 256 320 412 390 L 412 430 Q 256 420 100 430 Z" fill="#0c1d0c" />
  <path d="M 80 405 C 150 340 362 340 432 405 C 380 425 120 425 80 405 Z" fill="#081408" opacity="0.8" />

  <!-- Surfer Girl & Board Silhouette -->
  <!-- Surfboard (Leaning on her shoulder) -->
  <path d="M 175 410 C 170 360 190 240 270 290 C 275 320 220 390 195 415 Z" fill="#000" />
  
  <!-- Surfer Silhouette -->
  <!-- Legs -->
  <path d="M 215 410 L 222 360 L 220 320 L 228 320 L 232 360 L 235 410 Z" fill="#000" />
  <path d="M 226 410 L 232 360 L 234 322 L 242 320 L 244 360 L 248 410 Z" fill="#000" />
  <!-- Torso & Arms -->
  <path d="M 218 320 L 222 280 Q 224 258 234 258 Q 244 258 244 280 L 244 320 Z" fill="#000" />
  <!-- Ponytail and Head -->
  <circle cx="236" cy="246" r="10" fill="#000" />
  <path d="M 242 244 C 255 244 260 258 254 266 C 250 264 244 252 242 244 Z" fill="#000" />
  <!-- Arm holding board -->
  <path d="M 222 280 Q 200 290 196 320 L 202 322 Q 206 298 222 286 Z" fill="#000" />

  <!-- Palm Tree 1 (Left leaning) -->
  <!-- Trunk -->
  <path d="M 276 370 Q 290 280 340 210 Q 343 205 346 210 Q 295 285 282 370 Z" fill="#000" />
  <!-- Leaves/Fronds -->
  <!-- Top Fronds -->
  <path d="M 343 208 Q 320 180 270 190 Q 320 200 343 208 Z" fill="#000" />
  <path d="M 343 208 Q 330 160 295 145 Q 335 175 343 208 Z" fill="#000" />
  <path d="M 343 208 Q 360 160 380 145 Q 360 178 343 208 Z" fill="#000" />
  <path d="M 343 208 Q 380 185 410 195 Q 370 205 343 208 Z" fill="#000" />
  <path d="M 343 208 Q 385 220 405 250 Q 370 225 343 208 Z" fill="#000" />
  <path d="M 343 208 Q 360 240 350 280 Q 345 235 343 208 Z" fill="#000" />
  <path d="M 343 208 Q 325 240 305 270 Q 325 228 343 208 Z" fill="#000" />

  <!-- Palm Tree 2 (Smaller, Right leaning) -->
  <!-- Trunk -->
  <path d="M 315 375 Q 325 305 375 255 Q 378 252 381 255 Q 330 310 321 375 Z" fill="#000" />
  <!-- Leaves/Fronds -->
  <path d="M 378 253 Q 355 230 310 235 Q 355 245 378 253 Z" fill="#000" />
  <path d="M 378 253 Q 365 210 335 195 Q 370 220 378 253 Z" fill="#000" />
  <path d="M 378 253 Q 395 210 415 195 Q 395 225 378 253 Z" fill="#000" />
  <path d="M 378 253 Q 410 230 435 240 Q 400 250 378 253 Z" fill="#000" />
  <path d="M 378 253 Q 415 265 430 295 Q 400 270 378 253 Z" fill="#000" />
  <path d="M 378 253 Q 395 280 385 315 Q 380 275 378 253 Z" fill="#000" />

  <!-- Hibiscus Flower Silhouette (Bottom Left) -->
  <g transform="translate(130, 395) scale(0.7)">
    <!-- 5 Petals -->
    <path d="M 0 0 C -30 -10 -50 20 -30 40 C -10 60 20 40 0 0 Z" fill="#000" />
    <path d="M 0 0 C 10 -40 -30 -50 -40 -20 C -50 10 -20 30 0 0 Z" fill="#000" />
    <path d="M 0 0 C 40 -20 40 -60 10 -50 C -20 -40 -10 -10 0 0 Z" fill="#000" />
    <path d="M 0 0 C 50 15 60 50 30 50 C 0 50 -10 20 0 0 Z" fill="#000" />
    <path d="M 0 0 C 10 45 -30 60 -45 30 C -60 0 -30 -10 0 0 Z" fill="#000" />
    <!-- Stamen / Pistil -->
    <path d="M 5 -10 Q 45 -45 65 -30" stroke="#000" stroke-width="4" fill="none" />
    <circle cx="65" cy="-30" r="4" fill="#000" />
    <circle cx="60" cy="-36" r="3" fill="#000" />
    <circle cx="70" cy="-24" r="3" fill="#000" />
  </g>

  <!-- Stylized Branding Text -->
  <!-- "Joy" Text at the Top -->
  <text x="256" y="95" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
        font-weight="900" 
        font-size="82px" 
        font-style="italic"
        text-anchor="middle" 
        fill="url(#textGrad)" 
        stroke="#FFF" 
        stroke-width="8" 
        stroke-linejoin="round"
        paint-order="stroke fill"
        filter="url(#shadow)">JOY</text>

  <!-- "Tours" Text at the Bottom -->
  <text x="256" y="475" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
        font-weight="900" 
        font-size="76px" 
        font-style="italic"
        text-anchor="middle" 
        fill="url(#textGrad)" 
        stroke="#FFF" 
        stroke-width="8" 
        stroke-linejoin="round"
        paint-order="stroke fill"
        filter="url(#shadow)">TOURS</text>
</svg>
